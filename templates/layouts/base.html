<!DOCTYPE html>
<html lang="en" data-bs-theme="light" id="root-html">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ brand.abbreviation }} | SS-SPMS{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <style>
        :root {

            /* Branding Context (Provided by Context Processor) */
            --brand-primary: {
                    {
                    brand_primary|default: "#1e3a8a"
                }
            }

            ;

            --brand-secondary: {
                    {
                    brand_secondary|default: "#fbbf24"
                }
            }

            ;

            /* UI Refinements */
            --sidebar-width: 280px;
            --transition-speed: 0.25s;
        }

        /* Dynamic Theme Overrides */
        [data-bs-theme="dark"] {
            --brand-primary-muted: color-mix(in srgb, var(--brand-primary), white 20%);
        }

        .bg-brand-primary {
            background-color: var(--brand-primary) !important;
        }

        .text-brand-secondary {
            color: var(--brand-secondary) !important;
        }

        .btn-brand {
            background-color: var(--brand-primary);
            color: white;
            border: none;
            transition: opacity var(--transition-speed);
        }

        .btn-brand:hover {
            opacity: 0.9;
            color: white;
        }

        /* HTMX Loading State */
        .htmx-indicator {
            display: none;
        }

        .htmx-request .htmx-indicator {
            display: inline-block;
        }

        .htmx-request.content-fade {
            opacity: 0.5;
            transition: opacity 0.2s;
        }
    </style>
</head>

<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

    {% block layout %}
    {% endblock %}

    <script>
        const themeToggle = () => {
            const html = document.getElementById('root-html');
            const newTheme = html.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        };
        // Persistence
        if (localStorage.getItem('theme')) {
            document.getElementById('root-html').setAttribute('data-bs-theme', localStorage.getItem('theme'));
        }
    </script>
</body>

</html>
