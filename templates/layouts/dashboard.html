{% extends "layouts/base.html" %}

{% block layout %}
<div class="d-flex min-vh-100">
    {% include "components/navigation/sidebar.html" %}

    <div class="flex-grow-1 d-flex flex-column">
        <header class="navbar navbar-expand bg-body-tertiary border-bottom px-4 sticky-top">
            <div class="container-fluid">
                <div class="d-flex align-items-center">
                    <span class="htmx-indicator spinner-border spinner-border-sm text-primary me-2"></span>
                    <h5 class="mb-0 fs-6 fw-semibold text-muted">{% block page_title %}Dashboard{% endblock %}</h5>
                </div>

                <div class="ms-auto d-flex align-items-center gap-3">
                    <button class="btn btn-link nav-link" onclick="themeToggle()">
                        <i class="bi bi-circle-half"></i>
                    </button>

                    <div class="dropdown">
                        <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle"
                            data-bs-toggle="dropdown">
                            <div class="bg-brand-primary rounded-circle d-flex align-items-center justify-content-center text-white"
                                style="width: 32px; height: 32px;">
                                {{ user.username|first|upper }}
                            </div>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                            <li>
                                <h6 class="dropdown-header">{{ user.username }}</h6>
                            </li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="{% url 'logout' %}">Sign out</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </header>

        <main id="main-content" class="p-4 content-fade">
            {% block content %}{% endblock %}
        </main>
    </div>
</div>
{% endblock %}
