<div class="alert alert-success border-0 shadow-sm p-4 text-center">
    <i class="bi bi-check-circle-fill text-success" style="font-size: 3rem;"></i>
    <h4 class="mt-3 fw-bold">Registration Complete!</h4>
    <p>Student profile has been created and indexed.</p>

    <div class="bg-white rounded p-3 border mb-3">
        <span class="text-muted small d-block text-uppercase">Assigned SSID</span>
        <h2 class="text-primary fw-bold mb-0">{{ student.ssid }}</h2>
    </div>

    <div class="d-flex gap-2 justify-content-center">
        <button class="btn btn-outline-primary" hx-get="/ss/students/" hx-target="#main-content">
            View Student List
        </button>
        <button class="btn btn-primary" hx-get="/people/list/" hx-target="#main-content">
            Register Another
        </button>
    </div>
</div>
