<div class="modal-header border-0 pb-0">
    <div class="d-flex align-items-center gap-3">
        <div class="bg-brand-primary bg-opacity-10 text-brand-primary p-3 rounded-circle">
            <i class="bi bi-calendar2-plus fs-4"></i>
        </div>
        <div>
            <h5 class="modal-title fw-bold text-body">New Attendance Session</h5>
            <p class="text-muted small mb-0">Initialize a new manual entry sheet.</p>
        </div>
    </div>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<form hx-post="{% url 'sundayschool:hx-create-session' %}" hx-target="#modal-body">
    {% csrf_token %}
    <div class="modal-body p-4">
        <div class="mb-4">
            <label class="form-label small fw-bold text-body-secondary text-uppercase tracking-wider">Class
                Group</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-mortarboard"></i></span>
                <select name="class_group" class="form-select border-start-0 py-2 fs-6" required>
                    <option value="" selected disabled>Select Grade & Section...</option>
                    {% for cg in class_groups %}
                    <option value="{{ cg.id }}">{{ cg.grade.name }} - {{ cg.section.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="mb-4 p-3 bg-light rounded-4 border">
            {% include "components/forms/eth_date_picker.html" with prefix="session" label="Attendance Date (Ethiopian)"
            show_today_btn=True %}
        </div>

        <div class="alert alert-info border-0 shadow-sm rounded-4 px-4 py-3 d-flex align-items-center gap-3">
            <i class="bi bi-info-circle-fill fs-4 text-info opacity-75"></i>
            <div class="small">
                This will create a <span class="fw-bold">DRAFT</span> sheet for all active students in the selected
                class.
            </div>
        </div>
    </div>
    <div class="modal-footer border-0 p-4 pt-0">
        <button type="button" class="btn btn-light px-4 rounded-pill fw-medium" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-brand px-5 py-2 fw-bold rounded-pill">Initialize Sheet</button>
    </div>
</form>
