<div class="modal-header bg-success text-white">
    <h5 class="modal-title fw-bold"><i class="bi bi-shield-check"></i> Approve Attendance</h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>
<form hx-post="{% url 'sundayschool:hx-approve-attendance' session.id %}" hx-swap="none">
    {% csrf_token %}
    <div class="modal-body">
        <div class="mb-3">
            <label class="form-label small fw-bold text-muted">SUMMARY</label>
            <div class="p-3 bg-light rounded border">
                <div class="d-flex justify-content-between mb-1">
                    <span>Class Group:</span>
                    <span class="fw-bold">{{ session.class_group }}</span>
                </div>
                <div class="d-flex justify-content-between">
                    <span>Date (Eth):</span>
                    <span class="fw-bold">{{ session.attendance_date_eth_day }}/{{ session.attendance_date_eth_month
                        }}/{{ session.attendance_date_eth_year }}</span>
                </div>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label small fw-bold">Executive Comment / Note</label>
            <textarea name="comment" class="form-control" rows="3"
                placeholder="e.g., Records verified. Approved."></textarea>
        </div>

        <div class="alert alert-warning small border-0 shadow-sm">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <strong>Warning:</strong> Once approved, these records are locked and cannot be edited by HR Experts.
        </div>
    </div>
    <div class="modal-footer bg-light border-0">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-success px-4">Confirm Approval</button>
    </div>
</form>
