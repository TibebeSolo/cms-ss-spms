{% extends "layouts/base.html" %}

{% block content %}
<div class="d-flex align-items-center justify-content-center min-vh-100 bg-light-subtle">
    <div class="card shadow-lg border-0" style="width: 400px; border-top: 5px solid var(--brand-primary) !important;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                {% include "components/brand/logo.html" with mode="primary" %}
                <h4 class="mt-3 fw-bold">Sign In</h4>
                <p class="text-muted small">{{ brand.name }} Management System</p>
            </div>

            <form hx-post="{% url 'login' %}" hx-target="body" hx-indicator="#login-spinner" class="needs-validation">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label small fw-bold">SSID or Church ID</label>
                    <input type="text" name="username" class="form-control form-control-lg fs-6"
                        placeholder="e.g. SS24001" required>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold">Password</label>
                    <input type="password" name="password" class="form-control form-control-lg fs-6" required>
                </div>

                <button type="submit"
                    class="btn btn-brand w-100 py-2 fw-bold d-flex align-items-center justify-content-center">
                    <span id="login-spinner" class="htmx-indicator spinner-border spinner-border-sm me-2"></span>
                    Access System
                </button>
            </form>
        </div>
        <div class="card-footer bg-transparent border-0 text-center pb-4">
            <small class="text-muted">Single Parish Installation - v1.0.0</small>
        </div>
    </div>
</div>
{% endblock %}
