{% extends "layouts/base.html" %}

{% block layout %}
<div class="d-flex align-items-center justify-content-center min-vh-100"
    style="background: radial-gradient(circle at top right, var(--brand-primary), #0f172a);">
    <div class="card shadow-lg border-0 overflow-hidden" style="width: 420px; border-radius: 1.5rem;">
        <div class="bg-brand-primary p-4 text-center">
            {% include "components/brand/logo.html" with mode="light" %}
        </div>
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-body">Sign In</h3>
                <p class="text-muted small">Access the Sunday School Management System</p>
            </div>

            <form hx-post="{% url 'identity:login' %}" hx-target="body" hx-indicator="#login-spinner"
                class="needs-validation">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label small fw-bold text-body-secondary">SSID or Church ID</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i
                                class="bi bi-person text-muted"></i></span>
                        <input type="text" name="username"
                            class="form-control form-control-lg fs-6 bg-light border-start-0" placeholder="e.g. SS18001"
                            required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-body-secondary">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i
                                class="bi bi-lock text-muted"></i></span>
                        <input type="password" name="password"
                            class="form-control form-control-lg fs-6 bg-light border-start-0" required>
                    </div>
                </div>

                <button type="submit"
                    class="btn btn-brand w-100 py-3 fw-bold d-flex align-items-center justify-content-center rounded-pill">
                    <span id="login-spinner" class="htmx-indicator spinner-border spinner-border-sm me-3"></span>
                    Access System
                </button>
            </form>
        </div>
        <div class="card-footer bg-light border-0 text-center py-4">
            <small class="text-muted">Single Parish Installation <span class="mx-2">|</span> v1.0.0</small>
        </div>
    </div>
</div>
{% endblock %}
