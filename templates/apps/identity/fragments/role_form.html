<div class="modal-header border-0 pb-0">
    <div class="d-flex align-items-center gap-3">
        <div class="bg-brand-primary bg-opacity-10 text-brand-primary p-3 rounded-circle">
            <i class="bi bi-shield-lock-fill fs-4"></i>
        </div>
        <div>
            <h5 class="modal-title fw-bold text-body">{% if role %}Edit Role: {{ role.name }}{% else %}Create New Role{%
                endif %}</h5>
            <p class="text-muted small mb-0">Define specific access rules and permissions for users.</p>
        </div>
    </div>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<form hx-post="{% if role %}{% url 'identity:role_edit' role.pk %}{% else %}{% url 'identity:role_create' %}{% endif %}"
    hx-target="#role-table-container" hx-swap="innerHTML">
    {% csrf_token %}
    <div class="modal-body p-4">
        <div class="mb-4">
            <label class="form-label small fw-bold text-body-secondary text-uppercase tracking-wider">Role
                Designation</label>
            {{ form.name }}
        </div>
        <div class="mb-4">
            <label
                class="form-label small fw-bold text-body-secondary text-uppercase tracking-wider">Description</label>
            {{ form.description }}
        </div>

        <div class="mb-2 d-flex align-items-center justify-content-between">
            <label class="fw-bold text-body-secondary text-uppercase x-small tracking-widest">Available
                Permissions</label>
            <span class="badge bg-light text-muted border px-2 py-1 x-small">{{ all_perms|length }} Total</span>
        </div>

        <div class="row g-2 border rounded-4 p-3 bg-light bg-opacity-50 overflow-auto" style="max-height: 250px;">
            {% for perm in all_perms %}
            <div class="col-md-6">
                <div class="form-check p-2 rounded hover-bg border border-transparent transition-smooth">
                    <input class="form-check-input ms-0 me-2" type="checkbox" name="permissions" value="{{ perm.id }}"
                        id="perm_{{ perm.id }}" {% if perm in form.instance.permissions.all %}checked{% endif %}>
                    <label class="form-check-label d-block" for="perm_{{ perm.id }}">
                        <div class="fw-bold x-small text-brand-primary font-monospace">{{ perm.code }}</div>
                        <div class="text-muted xx-small lh-sm text-truncate">{{ perm.description }}</div>
                    </label>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
    <div class="modal-footer border-0 p-4 pt-0">
        <button type="button" class="btn btn-light px-4 rounded-pill fw-medium" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-brand px-5 py-2 fw-bold rounded-pill shadow-sm" data-bs-dismiss="modal">
            {% if role %}<i class="bi bi-save me-2"></i> Save Changes{% else %}<i class="bi bi-plus-circle me-2"></i>
            Create Role{% endif %}
        </button>
    </div>
</form>

<style>
    .xx-small {
        font-size: 0.65rem;
    }
</style>
