<div class="d-flex justify-content-between align-items-center mb-4">
    <h3>Role Management</h3>
    <button class="btn btn-brand btn-sm" hx-get="{% url 'identity:role-create' %}" hx-target="#modal-body"
        data-bs-toggle="modal" data-bs-target="#remoteModal">
        <i class="bi bi-plus-lg"></i> New Custom Role
    </button>
</div>

<div class="table-responsive">
    <table class="table table-hover align-middle mb-0">
        <thead class="bg-light bg-opacity-50">
            <tr class="small text-uppercase text-muted fw-bold">
                <th class="px-4 py-3">Role Name</th>
                <th class="px-4 py-3">Status</th>
                <th class="px-4 py-3">System Role?</th>
                <th class="px-4 py-3 text-end">Actions</th>
            </tr>
        </thead>
        <tbody class="border-top-0">
            {% for role in roles %}
            <tr class="sidebar-item-row border-bottom border-light">
                <td class="px-4 py-3">
                    <div class="fw-bold text-body">{{ role.name }}</div>
                </td>
                <td class="px-4 py-3">
                    <span class="badge rounded-pill bg-info-subtle text-info border border-info-subtle px-3 py-1">
                        {{ role.permissions.count }} permissions
                    </span>
                </td>
                <td class="px-4 py-3">
                    {% if role.is_system_role %}
                    <div class="d-flex align-items-center text-primary">
                        <i class="bi bi-shield-check-fill fs-5 me-2"></i>
                        <span class="small fw-medium">Core System</span>
                    </div>
                    {% else %}
                    <div class="d-flex align-items-center text-muted">
                        <i class="bi bi-person-gear fs-5 me-2"></i>
                        <span class="small fw-medium">Custom</span>
                    </div>
                    {% endif %}
                </td>
                <td class="px-4 py-3 text-end">
                    <button class="btn btn-sm btn-light border px-3 rounded-pill hover-bg"
                        hx-get="{% url 'identity:role-edit' role.id %}" hx-target="#main-content">
                        <i class="bi bi-pencil-square me-1"></i> Edit
                    </button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
