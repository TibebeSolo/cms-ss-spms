<div class="modal-body text-center p-4">
    <i class="bi bi-person-check-fill text-success" style="font-size: 3rem;"></i>
    <h5 class="fw-bold mt-3">Officer & Student Profile Created</h5>

    <div class="alert alert-info mt-3 text-start">
        <div class="small fw-bold">Login Username (SSID):</div>
        <div class="fs-4 font-monospace">{{ ssid }}</div>

        <div class="small fw-bold mt-2">Temporary Password:</div>
        <div class="fs-4 font-monospace text-brand-primary">{{ temp_pwd }}</div>

        <hr>
        <div class="x-small text-muted">Church ID: {{ church_id }}</div>
    </div>

    <p class="small text-muted mb-4">Please note: The officer must change this password upon their first login.</p>

    <button type="button" class="btn btn-brand w-100" data-bs-dismiss="modal">Done</button>
</div>
