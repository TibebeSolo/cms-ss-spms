<div class="modal-header border-0 pb-0">
    <div class="d-flex align-items-center gap-3">
        <div class="bg-brand-primary bg-opacity-10 text-brand-primary p-3 rounded-circle">
            <i class="bi bi-person-badge fs-4"></i>
        </div>
        <div>
            <h5 class="modal-title fw-bold text-body">Register New Officer</h5>
            <p class="text-muted small mb-0">Create a system account for administrative staff.</p>
        </div>
    </div>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<form hx-post="{% url 'identity:officer_create' %}" hx-target="#modal-content">
    {% csrf_token %}
    <div class="modal-body p-4">
        <div class="row g-4">
            <div class="col-12">
                <label class="form-label small fw-bold text-body-secondary text-uppercase tracking-wider">Login Username
                    (SSID)</label>
                {{ form.username }}
            </div>
            <div class="col-md-6">
                <label class="form-label small fw-bold text-body-secondary text-uppercase tracking-wider">First
                    Name</label>
                {{ form.first_name }}
            </div>
            <div class="col-md-6">
                <label class="form-label small fw-bold text-body-secondary text-uppercase tracking-wider">Last
                    Name</label>
                {{ form.last_name }}
            </div>
            <div class="col-12">
                <label class="form-label small fw-bold text-body-secondary text-uppercase tracking-wider">Email
                    Address</label>
                {{ form.email }}
            </div>
            <div class="col-12">
                <div class="p-3 bg-light rounded-4 border">
                    <label class="form-label small fw-bold text-brand-primary text-uppercase tracking-wider">System
                        Access Level</label>
                    {{ form.role }}
                    <div class="form-text x-small text-muted mt-2">
                        <i class="bi bi-info-circle me-1"></i> This determines available sidebar modules and
                        administrative capabilities.
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal-footer border-0 p-4 pt-0">
        <button type="button" class="btn btn-light px-4 rounded-pill fw-medium" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-brand px-5 py-2 fw-bold rounded-pill shadow-sm">
            Register & Generate Password
        </button>
    </div>
</form>
