name: CI

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black pytest pytest-django django-environ ethioqen reportlab openpyxl Pillow django-htmx psycopg[binary]
          
      - name: Lint with ruff
        run: ruff check .
        
      - name: Check formatting with black
        run: black --check .
        
      - name: Run tests
        run: |
          cp .env.example .env
          export DB_HOST=localhost
          export DB_PORT=5432
          # Note: In a real CI, you'd start a Postgres container here via services
          # For now, we'll assume a basic smoke test that doesn't need a real DB or use sqlite for CI
          pytest
