name: CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ss_spms
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

# ... (keep your existing triggers and postgres service) ...

    env:
      # These are what your base.py is currently looking for:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: ss_spms
      # Keep this as well for general compatibility
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ss_spms
      SECRET_KEY: "ci-test-key-not-for-prod"
      DEBUG: "True"
      PYTHONPATH: .
      DJANGO_SETTINGS_MODULE: config.settings.base

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black pytest pytest-django django-environ \
                      ethioqen reportlab openpyxl Pillow django-htmx \
                      psycopg[binary]

      # We must ensure the DB is ready before migrating
      - name: Wait for Database
        run: |
          until pg_isready -h localhost -p 5432; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests
        run: pytest