name: CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ss_spms
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ss_spms
      SECRET_KEY: "ci-test-key-not-for-prod"
      DEBUG: "True"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Speeds up subsequent runs

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black pytest pytest-django django-environ \
                      ethioqen reportlab openpyxl Pillow django-htmx \
                      psycopg[binary]

      - name: Lint with Ruff
        run: ruff check .

      - name: Check Formatting (Black)
        run: black --check .

      - name: Run Migrations
        run: |
          cp .env.example .env || true
          python manage.py migrate

      - name: Run Tests
        run: pytest